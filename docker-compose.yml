services:
  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    env_file:
      - config.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
  
volumes:
  postgres_data: